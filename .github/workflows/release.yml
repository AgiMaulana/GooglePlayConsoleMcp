name: Release

on:
  push:
    branches:
      - "release/*"

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse_version.outputs.version }}
    steps:
      - name: Parse version from branch name
        id: parse_version
        run: |
          VERSION="${GITHUB_REF#refs/heads/release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update server.json version
        env:
          VERSION: ${{ steps.parse_version.outputs.version }}
        run: |
          python3 -c "
          import json
          with open('server.json') as f:
              data = json.load(f)
          data['version'] = '$VERSION'
          for pkg in data.get('packages', []):
              pkg['version'] = '$VERSION'
          with open('server.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit version bump
        env:
          VERSION: ${{ steps.parse_version.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add server.json
            git commit -m "release: v$VERSION"
            git push origin release/$VERSION
          fi

      - name: Create tag
        env:
          VERSION: ${{ steps.parse_version.outputs.version }}
        run: |
          git tag "v$VERSION" || true
          git push origin "refs/tags/v$VERSION" || true

      - name: Create GitHub Release
        env:
          VERSION: ${{ steps.parse_version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "Release v$VERSION" \
            --target main || true

  publish-pypi:
    name: Publish to PyPI
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "refs/tags/v${{ needs.prepare.outputs.version }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp:
    name: Publish to MCP Registry
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "refs/tags/v${{ needs.prepare.outputs.version }}"

      - name: Install MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish